<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>It's dot mom</title>
    <link rel="canonical" href="https://saga.mom/" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💩</text></svg>"
    />
    <style>
      :root {
        --dark-color: #333;
        --light-color: #fff;
      }
      ::selection {
        color: var(--dark-color);
        background-color: var(--light-color);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        margin: 0;
        padding-inline: 1em;

        font-display: fallback;
        font-family: sans-serif;
        font-size: max(1.2em, 1.6vw);
        line-height: 1.5;
        text-align: center;

        color: var(--light-color);
        background-color: var(--dark-color);
        background-image: linear-gradient(
          160deg,
          rgba(51, 51, 51, 1) 50%,
          rgba(33, 33, 33, 1) 100%
        );
      }

      main {
        max-width: 100%;
        margin-block: 1em;
      }
      blockquote {
        margin-block: 0.5em;
        font-size: 2em;
        font-weight: 700;
        font-display: swap;
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <main>
      <blockquote>“Ocarina of Time is a garbage game”</blockquote>
      <cite>—K-dog, June 7th, 2026</cite>
    </main>
  </body>
</html>
